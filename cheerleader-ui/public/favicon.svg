<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0d130d"></stop>
      <stop offset="100%" stop-color="#0a0e0a"></stop>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.9" result="b"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
    <pattern id="scan" width="2" height="2" patternUnits="userSpaceOnUse">
      <rect width="2" height="1" fill="#7ee787" fill-opacity="0.05"></rect>
    </pattern>
  </defs>


  <rect width="32" height="32" rx="5" fill="url(#bg)"></rect>
  <rect width="32" height="32" rx="5" fill="url(#scan)"></rect>
  <rect x="0.5" y="0.5" width="31" height="31" rx="4.5" fill="none" stroke="#1e2f1e" stroke-width="1"></rect>


  <path d="M 7 11 L 11 16 L 7 21" fill="none" stroke="#3fb950" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter" filter="url(#glow)"></path>


  <rect x="14" y="11" width="8" height="10" fill="#7ee787" filter="url(#glow)">

  </rect>
</svg>
